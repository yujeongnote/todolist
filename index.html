<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; display: flex; justify-content: center;
      background: #f0f2f5; font-family: 'Segoe UI', sans-serif;
    }

    .card { width: 520px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); overflow: hidden; }

    .card-header { background: #4f46e5; padding: 28px 32px 20px; color: #fff; }
    .card-header h1 { font-size: 22px; font-weight: 700; }
    .counter { margin-top: 6px; font-size: 13px; opacity: 0.8; }

    .card-body { padding: 24px 32px 32px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; }
    .input-row input[type="text"] {
      flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .input-row input[type="text"]:focus { border-color: #4f46e5; }

    .desc-row textarea {
      width: 100%; padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #475569;
      resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5;
    }
    .desc-row textarea:focus { border-color: #4f46e5; }

    .time-row { display: flex; align-items: center; gap: 10px; }
    .time-row label { font-size: 13px; color: #64748b; white-space: nowrap; }
    .time-row input[type="time"] {
      flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; outline: none; color: #1e293b; transition: border-color 0.2s;
    }
    .time-row input[type="time"]:focus { border-color: #4f46e5; }

    .btn-add {
      padding: 10px 18px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-add:hover { background: #4338ca; }

    /* 그룹 관리 */
    .group-section { margin-bottom: 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; }

    .group-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #f8fafc; cursor: pointer; user-select: none;
    }
    .group-section-title { font-size: 13px; font-weight: 600; color: #475569; }
    .group-section-toggle { font-size: 11px; color: #94a3b8; }

    .group-section-body { padding: 12px 14px; border-top: 1.5px solid #e2e8f0; display: none; }
    .group-section-body.open { display: block; }

    .group-add-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .group-add-row input {
      flex: 1; padding: 7px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .group-add-row input:focus { border-color: #4f46e5; }

    .btn-group-add {
      padding: 7px 14px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-group-add:hover { background: #4338ca; }

    .group-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .group-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: #ede9fe; color: #5b21b6;
      border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .chip-del { cursor: pointer; color: #a78bfa; font-size: 11px; line-height: 1; }
    .chip-del:hover { color: #f87171; }

    /* 상태 탭 */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600;
      color: #64748b; background: #f1f5f9; border: 2px solid transparent;
      border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { background: #e2e8f0; }
    .tab.active { background: #fbbf24; color: #78350f; border-color: #f59e0b; box-shadow: 0 2px 8px rgba(251,191,36,0.4); }

    /* 할일 목록 */
    .todo-list { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; transition: border-color 0.2s, background 0.2s;
    }
    .todo-item:hover { border-color: #c7d2fe; }
    .todo-item.done { background: #f8fafc; border-color: #e2e8f0; }

    .todo-item input[type="radio"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; margin-top: 2px;
      border: 2px solid #cbd5e1; border-radius: 50%;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s; position: relative;
    }
    .todo-item input[type="radio"]:checked { border-color: #4f46e5; background: #4f46e5; }
    .todo-item input[type="radio"]:checked::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 6px; height: 6px; border-radius: 50%; background: #fff;
    }

    .todo-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .todo-text { font-size: 14px; font-weight: 600; color: #1e293b; transition: color 0.2s; }
    .todo-desc { font-size: 12px; color: #64748b; line-height: 1.5; }
    .todo-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .todo-time { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #94a3b8; }
    .todo-item.done .todo-desc { color: #cbd5e1; }
    .todo-item.done .todo-time { color: #cbd5e1; }
    .todo-completed-at { font-size: 11px; color: #a78bfa; font-weight: 500; }

    .btn-delete {
      background: none; border: none; color: #cbd5e1; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px;
      transition: color 0.2s; flex-shrink: 0;
    }
    .btn-delete:hover { color: #f87171; }

    .empty { text-align: center; padding: 32px 0 24px; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { color: #64748b; font-size: 14px; font-weight: 500; }
    .empty-sub { color: #94a3b8; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Todo List</h1>
      <div class="counter" id="counter">남은 일정: 0개</div>
    </div>
    <div class="card-body">
      <div class="input-group">
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="새 일정을 입력하세요" />
          <button class="btn-add" onclick="addTodo()">추가</button>
        </div>
        <div class="desc-row">
          <textarea id="descInput" rows="2" placeholder="설명 (선택)"></textarea>
        </div>
        <div class="time-row">
          <label for="timeInput">시간</label>
          <input type="time" id="timeInput" />
        </div>
      </div>

      <!-- 그룹 관리 -->
      <div class="group-section">
        <div class="group-section-header" onclick="toggleGroupSection()">
          <span class="group-section-title">그룹 관리</span>
          <span class="group-section-toggle" id="groupToggleIcon">▼ 펼치기</span>
        </div>
        <div class="group-section-body" id="groupSectionBody">
          <div class="group-add-row">
            <input type="text" id="groupInput" placeholder="그룹 이름 (예: Home, Work)" />
            <button class="btn-group-add" onclick="addGroup()">추가</button>
          </div>
          <div class="group-chips" id="groupChips"></div>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="setTab('all', this)">전체</div>
        <div class="tab" onclick="setTab('active', this)">진행중</div>
        <div class="tab" onclick="setTab('done', this)">완료</div>
      </div>

      <div class="todo-list" id="todoList"></div>
    </div>
  </div>

  <script>
    let todos = [];
    let groups = [];
    let currentTab = 'all';
    let nextId = 1;

    const input = document.getElementById('todoInput');
    const descInput = document.getElementById('descInput');
    const timeInput = document.getElementById('timeInput');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    document.getElementById('groupInput').addEventListener('keydown', e => { if (e.key === 'Enter') addGroup(); });

    function toggleGroupSection() {
      const body = document.getElementById('groupSectionBody');
      const icon = document.getElementById('groupToggleIcon');
      const open = body.classList.toggle('open');
      icon.textContent = open ? '▲ 접기' : '▼ 펼치기';
    }

    function addGroup() {
      const gInput = document.getElementById('groupInput');
      const name = gInput.value.trim();
      if (!name || groups.includes(name)) return;
      groups.push(name);
      gInput.value = '';
      renderGroups();
    }

    function deleteGroup(name) {
      groups = groups.filter(g => g !== name);
      todos.forEach(t => { if (t.group === name) t.group = ''; });
      renderGroups();
      render();
    }

    function renderGroups() {
      const chips = document.getElementById('groupChips');
      chips.innerHTML = groups.length === 0
        ? '<span style="font-size:12px;color:#94a3b8;">아직 그룹이 없습니다.</span>'
        : groups.map(g => `
            <span class="group-chip">
              ${escapeHtml(g)}
              <span class="chip-del" onclick="deleteGroup('${escapeHtml(g)}')" title="삭제">✕</span>
            </span>`).join('');
    }

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active'); render();
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, desc: descInput.value.trim(), time: timeInput.value, group: '', done: false, completedAt: null });
      input.value = ''; descInput.value = ''; timeInput.value = '';
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.done = !todo.done;
        if (todo.done) {
          const now = new Date();
          const pad = n => String(n).padStart(2,'0');
          todo.completedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        } else { todo.completedAt = null; }
      }
      render();
    }

    function deleteTodo(id) { todos = todos.filter(t => t.id !== id); render(); }

    function formatTime(time) {
      if (!time) return '';
      const [h, m] = time.split(':'); const hour = parseInt(h);
      return `${hour < 12 ? '오전' : '오후'} ${hour === 0 ? 12 : hour > 12 ? hour - 12 : hour}:${m}`;
    }

    function sortByTime(list) {
      return [...list].sort((a, b) => {
        if (!a.time && !b.time) return 0; if (!a.time) return 1; if (!b.time) return -1;
        return a.time.localeCompare(b.time);
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('counter').textContent = `남은 일정: ${remaining}개`;

      const filtered = todos.filter(t => currentTab === 'all' || (currentTab === 'active' ? !t.done : t.done));
      const sorted = sortByTime(filtered);
      const list = document.getElementById('todoList');

      if (sorted.length === 0) {
        const allDone = todos.length > 0 && todos.every(t => t.done);
        list.innerHTML = allDone
          ? `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">오늘 일정이 모두 완료되었습니다.</div><div class="empty-sub">수고하셨습니다!</div></div>`
          : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">오늘 일정이 모두 완료되었습니다.</div><div class="empty-sub">새 일정을 추가해보세요.</div></div>`;
        return;
      }

      list.innerHTML = sorted.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <input type="radio" ${t.done ? 'checked' : ''} onclick="toggleTodo(${t.id})" />
          <div class="todo-info">
            <span class="todo-text">${escapeHtml(t.text)}</span>
            ${t.desc ? `<span class="todo-desc">${escapeHtml(t.desc)}</span>` : ''}
            <div class="todo-meta">
              ${t.time ? `<span class="todo-time">${formatTime(t.time)}</span>` : ''}
              ${t.done && t.completedAt ? `<span class="todo-completed-at">완료: ${t.completedAt}</span>` : ''}
            </div>
          </div>
          <button class="btn-delete" onclick="deleteTodo(${t.id})" title="삭제">✕</button>
        </div>`).join('');
    }

    renderGroups();
    render();
  </script>
</body>
</html>
