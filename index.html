<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      /* align-items: center; */
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 28px 32px 20px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .counter {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.8;
    }

    .card-body {
      padding: 24px 32px 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: #4f46e5;
    }

    .time-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-row label {
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
    }

    .time-row input[type="time"] {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      color: #1e293b;
      transition: border-color 0.2s;
    }

    .time-row input[type="time"]:focus {
      border-color: #4f46e5;
    }

    .btn-add {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: #4338ca;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      background: #f1f5f9;
      border: 2px solid transparent;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      background: #e2e8f0;
    }

    .tab.active {
      background: #fbbf24;
      color: #78350f;
      border-color: #f59e0b;
      box-shadow: 0 2px 8px rgba(251, 191, 36, 0.4);
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .todo-item:hover {
      border-color: #c7d2fe;
    }

    .todo-item.done {
      background: #f8fafc;
      border-color: #e2e8f0;
    }

    .todo-item input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }

    .todo-item input[type="radio"]:checked {
      border-color: #4f46e5;
      background: #4f46e5;
    }

    .todo-item input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .todo-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .todo-text {
      font-size: 14px;
      color: #1e293b;
      transition: color 0.2s;
    }

    .todo-time {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .todo-item.done .todo-time {
      color: #cbd5e1;
    }

    .todo-completed-at {
      font-size: 11px;
      color: #a78bfa;
      font-weight: 500;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .btn-delete:hover {
      color: #f87171;
    }

    .empty {
      text-align: center;
      padding: 32px 0 24px;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .empty-text {
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
    }

    .empty-sub {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Todo List</h1>
      <div class="counter" id="counter">남은 일정: 0개</div>
    </div>
    <div class="card-body">
      <div class="input-group">
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="새 일정을 입력하세요" />
          <button class="btn-add" onclick="addTodo()">추가</button>
        </div>
        <div class="time-row">
          <label for="timeInput">시간</label>
          <input type="time" id="timeInput" />
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="setTab('all', this)">전체</div>
        <div class="tab" onclick="setTab('active', this)">진행중</div>
        <div class="tab" onclick="setTab('done', this)">완료</div>
      </div>

      <div class="todo-list" id="todoList"></div>
    </div>
  </div>

  <script>
    let todos = [];
    let currentTab = 'all';
    let nextId = 1;

    const input = document.getElementById('todoInput');
    const timeInput = document.getElementById('timeInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      const time = timeInput.value;
      todos.push({ id: nextId++, text, time, done: false });
      input.value = '';
      timeInput.value = '';
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.done = !todo.done;
        if (todo.done) {
          const now = new Date();
          const yyyy = now.getFullYear();
          const mm = String(now.getMonth() + 1).padStart(2, '0');
          const dd = String(now.getDate()).padStart(2, '0');
          const hh = String(now.getHours()).padStart(2, '0');
          const min = String(now.getMinutes()).padStart(2, '0');
          todo.completedAt = `${yyyy}-${mm}-${dd} ${hh}:${min}`;
        } else {
          todo.completedAt = null;
        }
      }
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function formatTime(time) {
      if (!time) return '';
      const [h, m] = time.split(':');
      const hour = parseInt(h);
      const ampm = hour < 12 ? '오전' : '오후';
      const displayHour = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
      return `${ampm} ${displayHour}:${m}`;
    }

    function sortByTime(list) {
      return [...list].sort((a, b) => {
        if (!a.time && !b.time) return 0;
        if (!a.time) return 1;
        if (!b.time) return -1;
        return a.time.localeCompare(b.time);
      });
    }

    function render() {
      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('counter').textContent = `남은 일정: ${remaining}개`;

      const filtered = todos.filter(t => {
        if (currentTab === 'all') return true;
        if (currentTab === 'active') return !t.done;
        if (currentTab === 'done') return t.done;
      });

      const sorted = sortByTime(filtered);
      const list = document.getElementById('todoList');

      if (sorted.length === 0) {
        const isDoneTab = currentTab === 'done';
        const allDone = todos.length > 0 && todos.every(t => t.done);
        const showComplete = currentTab === 'all' ? allDone : currentTab === 'active' ? allDone && todos.length > 0 : false;

        if (showComplete || isDoneTab && todos.filter(t => t.done).length === 0) {
          list.innerHTML = `
            <div class="empty">
              <div class="empty-icon">✅</div>
              <div class="empty-text">오늘 일정이 모두 완료되었습니다.</div>
              <div class="empty-sub">수고하셨습니다!</div>
            </div>`;
        } else {
          list.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📋</div>
              <div class="empty-text">오늘 일정이 모두 완료되었습니다.</div>
              <div class="empty-sub">새 일정을 추가해보세요.</div>
            </div>`;
        }
        return;
      }

      list.innerHTML = sorted.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <input
            type="radio"
            ${t.done ? 'checked' : ''}
            onclick="toggleTodo(${t.id})"
          />
          <div class="todo-info">
            <span class="todo-text">${escapeHtml(t.text)}</span>
            ${t.time ? `<span class="todo-time">${formatTime(t.time)}</span>` : ''}
            ${t.done && t.completedAt ? `<span class="todo-completed-at">완료: ${t.completedAt}</span>` : ''}
          </div>
          <button class="btn-delete" onclick="deleteTodo(${t.id})" title="삭제">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
