<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #f0f2f5; font-family: 'Segoe UI', sans-serif;
    }

    .card { width: 440px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); overflow: hidden; }

    .card-header { background: #4f46e5; padding: 28px 32px 20px; color: #fff; }
    .card-header h1 { font-size: 22px; font-weight: 700; }
    .counter { margin-top: 6px; font-size: 13px; opacity: 0.8; }

    .card-body { padding: 24px 32px 32px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; }
    .input-row input[type="text"] {
      flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .input-row input[type="text"]:focus { border-color: #4f46e5; }

    .desc-row textarea {
      width: 100%; padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #475569;
      resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5;
    }
    .desc-row textarea:focus { border-color: #4f46e5; }

    .btn-add {
      padding: 10px 18px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-add:hover { background: #4338ca; }

    .group-row { display: flex; align-items: center; gap: 10px; }
    .group-row label { font-size: 13px; color: #64748b; white-space: nowrap; }
    .group-row select {
      flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; color: #1e293b; background: #fff;
      outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .group-row select:focus { border-color: #4f46e5; }

    .todo-group-badge {
      padding: 1px 8px; background: #ede9fe; color: #5b21b6;
      border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }

    /* 그룹 추가 */
    .group-add-row { display: flex; gap: 8px; }
    .group-add-row input {
      flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .group-add-row input:focus { border-color: #4f46e5; }

    .btn-group-add {
      padding: 8px 14px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-group-add:hover { background: #4338ca; }

    /* 그룹 칩 목록 */
    .group-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .group-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .group-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: #ede9fe; color: #5b21b6;
      border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .chip-del { cursor: pointer; color: #a78bfa; font-size: 11px; line-height: 1; }
    .chip-del:hover { color: #f87171; }

    /* 그룹 필터 */
    .group-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .gf-btn {
      padding: 5px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px;
      background: #f8fafc; color: #64748b; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .gf-btn:hover { border-color: #a78bfa; color: #5b21b6; }
    .gf-btn.active { background: #ede9fe; border-color: #a78bfa; color: #5b21b6; }

    /* 상태 탭 */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600;
      color: #64748b; background: #f1f5f9; border: 2px solid transparent;
      border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { background: #e2e8f0; }
    .tab.active { background: #fbbf24; color: #78350f; border-color: #f59e0b; box-shadow: 0 2px 8px rgba(251,191,36,0.4); }

    /* 할일 목록 */
    .todo-list { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; transition: border-color 0.2s, background 0.2s;
    }
    .todo-item:hover { border-color: #c7d2fe; }
    .todo-item.done { background: #f8fafc; border-color: #e2e8f0; }

    .todo-item input[type="radio"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; margin-top: 2px;
      border: 2px solid #cbd5e1; border-radius: 50%;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s; position: relative;
    }
    .todo-item input[type="radio"]:checked { border-color: #4f46e5; background: #4f46e5; }
    .todo-item input[type="radio"]:checked::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 6px; height: 6px; border-radius: 50%; background: #fff;
    }

    .todo-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .todo-text { font-size: 14px; font-weight: 600; color: #1e293b; transition: color 0.2s; }
    .todo-desc { font-size: 12px; color: #64748b; line-height: 1.5; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #94a3b8; }
    .todo-item.done .todo-desc { color: #cbd5e1; }
    .todo-completed-at { font-size: 11px; color: #a78bfa; font-weight: 500; }

    .btn-delete {
      background: none; border: none; color: #cbd5e1; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px;
      transition: color 0.2s; flex-shrink: 0;
    }
    .btn-delete:hover { color: #f87171; }

    .empty { text-align: center; padding: 32px 0 24px; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { color: #64748b; font-size: 14px; font-weight: 500; }
    .empty-sub { color: #94a3b8; font-size: 12px; margin-top: 4px; }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #64748b; z-index: 100;
    }
    .loading-overlay.hidden { display: none; }

    .btn-logout {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 5px 12px; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.35); }

    .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
    .auth-tab {
      flex: 1; padding: 10px 0; background: none; border: none; border-bottom: 2px solid transparent;
      font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer;
      margin-bottom: -2px; transition: color 0.2s, border-color 0.2s;
    }
    .auth-tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .auth-input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; outline: none; margin-bottom: 10px; transition: border-color 0.2s;
      font-family: inherit;
    }
    .auth-input:focus { border-color: #4f46e5; }
    .auth-error  { color: #ef4444; font-size: 13px; margin-bottom: 10px; min-height: 18px; }
    .auth-success{ color: #22c55e; font-size: 13px; margin-bottom: 10px; min-height: 18px; }
    .auth-submit {
      width: 100%; padding: 11px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .auth-submit:hover { background: #4338ca; }
    .auth-submit:disabled { background: #a5b4fc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">데이터를 불러오는 중...</div>

  <!-- 로그인/회원가입 카드 -->
  <div class="card" id="authCard" style="display:none;">
    <div class="card-header">
      <h1>Todo List</h1>
      <div class="counter">로그인하여 시작하세요</div>
    </div>
    <div class="card-body">
      <div class="auth-tabs">
        <button id="loginTabBtn" class="auth-tab active" onclick="switchAuthMode('login')">로그인</button>
        <button id="signupTabBtn" class="auth-tab" onclick="switchAuthMode('signup')">회원가입</button>
      </div>
      <input type="email" id="authEmail" class="auth-input" placeholder="이메일" />
      <input type="password" id="authPassword" class="auth-input" placeholder="비밀번호" />
      <div id="authMsg"></div>
      <button id="authSubmitBtn" class="auth-submit" onclick="handleAuth()">로그인</button>
    </div>
  </div>

  <!-- 할일 앱 카드 -->
  <div class="card" id="appCard" style="display:none;">
    <div class="card-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <h1>Todo List</h1>
          <div class="counter" id="counter">남은 일정: 0개</div>
        </div>
        <button class="btn-logout" onclick="signOut()">로그아웃</button>
      </div>
    </div>
    <div class="card-body">
      <div class="input-group">
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="새 일정을 입력하세요" />
          <button class="btn-add" onclick="addTodo()">+ 일정 추가</button>
        </div>
        <div class="desc-row">
          <textarea id="descInput" rows="2" placeholder="설명 (선택)"></textarea>
        </div>
        <div class="group-row">
          <label for="groupSelect">그룹</label>
          <select id="groupSelect"><option value="">그룹 입니다</option></select>
        </div>
        <div class="group-add-row">
          <input type="text" id="groupInput" placeholder="새 그룹 이름 추가 (예: Home, Work)" />
          <button class="btn-group-add" onclick="addGroup()">그룹 추가</button>
        </div>
      </div>

      <!-- 그룹 관리 (칩 목록) -->
      <div class="group-chips-wrap" id="groupChipsWrap" style="display:none;">
        <div class="group-chips" id="groupChips"></div>
      </div>

      <!-- 그룹 필터 -->
      <div class="group-filter" id="groupFilter" style="display:none;"></div>

      <div class="tabs">
        <div class="tab active" onclick="setTab('all', this)">전체</div>
        <div class="tab" onclick="setTab('active', this)">진행중</div>
        <div class="tab" onclick="setTab('done', this)">완료</div>
      </div>

      <div class="todo-list" id="todoList"></div>
    </div>
  </div><!-- /#appCard -->

  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    const supabase = createClient(
      import.meta.env.VITE_SUPABASE_URL,
      import.meta.env.VITE_SUPABASE_PUBLISHABLE_KEY
    )

    let currentUser = null;
    let todos = [];
    let groups = [];
    let currentTab = 'all';
    let currentGroup = '';
    let authMode = 'login';

    const input = document.getElementById('todoInput');
    const descInput = document.getElementById('descInput');
    const groupSelect = document.getElementById('groupSelect');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    document.getElementById('groupInput').addEventListener('keydown', e => { if (e.key === 'Enter') addGroup(); });
    document.getElementById('authEmail').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authPassword').focus(); });
    document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });

    // ── 인증 ─────────────────────────────────────
    function switchAuthMode(mode) {
      authMode = mode;
      document.getElementById('loginTabBtn').classList.toggle('active', mode === 'login');
      document.getElementById('signupTabBtn').classList.toggle('active', mode === 'signup');
      document.getElementById('authSubmitBtn').textContent = mode === 'login' ? '로그인' : '회원가입';
      const msg = document.getElementById('authMsg');
      msg.textContent = '';
      msg.className = '';
    }

    async function handleAuth() {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const msg = document.getElementById('authMsg');
      const btn = document.getElementById('authSubmitBtn');

      if (!email || !password) { msg.className = 'auth-error'; msg.textContent = '이메일과 비밀번호를 입력하세요.'; return; }

      btn.disabled = true;
      msg.textContent = '';

      if (authMode === 'login') {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { msg.className = 'auth-error'; msg.textContent = error.message; btn.disabled = false; }
      } else {
        const { error } = await supabase.auth.signUp({ email, password });
        btn.disabled = false;
        if (error) { msg.className = 'auth-error'; msg.textContent = error.message; return; }
        msg.className = 'auth-success';
        msg.textContent = '확인 이메일을 발송했습니다. 이메일을 확인 후 로그인해주세요.';
      }
    }

    async function signOut() {
      await supabase.auth.signOut();
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      currentUser = session?.user ?? null;
      if (currentUser) {
        document.getElementById('authCard').style.display = 'none';
        document.getElementById('appCard').style.display = 'block';
        await loadData();
      } else {
        document.getElementById('authCard').style.display = 'block';
        document.getElementById('appCard').style.display = 'none';
        todos = [];
        groups = [];
      }
      document.getElementById('loadingOverlay').classList.add('hidden');
    });

    // ── 데이터 ────────────────────────────────────
    async function loadData() {
      const [{ data: todosData, error: todosErr }, { data: groupsData, error: groupsErr }] = await Promise.all([
        supabase.from('todos').select('*').eq('user_id', currentUser.id).order('created_at'),
        supabase.from('groups').select('*').eq('user_id', currentUser.id).order('created_at')
      ]);
      if (todosErr || groupsErr) {
        alert('데이터 로딩 실패: ' + (todosErr || groupsErr).message);
        return;
      }
      todos = (todosData || []).map(t => ({
        id: t.id, text: t.text, desc: t.description || '',
        group: t.group_name || '', done: t.done, completedAt: t.completed_at
      }));
      groups = (groupsData || []).map(g => g.name);
      renderGroups();
      render();
    }

    async function addGroup() {
      const gInput = document.getElementById('groupInput');
      const name = gInput.value.trim();
      if (!name || groups.includes(name)) return;
      const { error } = await supabase.from('groups').insert({ name, user_id: currentUser.id });
      if (error) { alert('그룹 추가 실패: ' + error.message); return; }
      groups.push(name);
      gInput.value = '';
      renderGroups();
    }

    async function deleteGroup(name) {
      const { error } = await supabase.from('groups').delete().eq('name', name).eq('user_id', currentUser.id);
      if (error) { alert('그룹 삭제 실패: ' + error.message); return; }
      const affected = todos.filter(t => t.group === name).map(t => t.id);
      if (affected.length > 0) {
        await supabase.from('todos').update({ group_name: '' }).in('id', affected);
      }
      groups = groups.filter(g => g !== name);
      todos.forEach(t => { if (t.group === name) t.group = ''; });
      renderGroups();
      render();
    }

    function renderGroups() {
      const wrap = document.getElementById('groupChipsWrap');
      const chips = document.getElementById('groupChips');
      if (groups.length === 0) {
        wrap.style.display = 'none';
        chips.innerHTML = '';
      } else {
        wrap.style.display = 'flex';
        chips.innerHTML = groups.map(g => `
            <span class="group-chip">
              ${escapeHtml(g)}
              <span class="chip-del" onclick="deleteGroup('${escapeHtml(g)}')" title="삭제">✕</span>
            </span>`).join('');
      }

      groupSelect.innerHTML = '<option value="">그룹 없음</option>' +
        groups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');

      const filter = document.getElementById('groupFilter');
      if (groups.length === 0) {
        filter.innerHTML = '';
        filter.style.display = 'none';
      } else {
        filter.style.display = 'flex';
        filter.innerHTML =
          `<button class="gf-btn ${currentGroup === '' ? 'active' : ''}" onclick="setGroupFilter('', this)">전체</button>` +
          groups.map(g =>
            `<button class="gf-btn ${currentGroup === g ? 'active' : ''}" onclick="setGroupFilter('${escapeHtml(g)}', this)">${escapeHtml(g)}</button>`
          ).join('');
      }
    }

    function setGroupFilter(group, el) {
      currentGroup = group;
      document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      const { data, error } = await supabase
        .from('todos')
        .insert({ text, description: descInput.value.trim(), group_name: groupSelect.value, done: false, user_id: currentUser.id })
        .select()
        .single();
      if (error) { alert('추가 실패: ' + error.message); return; }
      todos.push({ id: data.id, text: data.text, desc: data.description, group: data.group_name, done: data.done, completedAt: data.completed_at });
      input.value = ''; descInput.value = ''; groupSelect.value = '';
      render();
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const newDone = !todo.done;
      let completedAt = null;
      if (newDone) {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        completedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      }
      const { error } = await supabase.from('todos').update({ done: newDone, completed_at: completedAt }).eq('id', id);
      if (error) { alert('수정 실패: ' + error.message); return; }
      todo.done = newDone;
      todo.completedAt = completedAt;
      render();
    }

    async function deleteTodo(id) {
      const { error } = await supabase.from('todos').delete().eq('id', id);
      if (error) { alert('삭제 실패: ' + error.message); return; }
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('counter').textContent = `남은 일정: ${remaining}개`;

      const filtered = todos.filter(t => {
        const statusOk = currentTab === 'all' || (currentTab === 'active' ? !t.done : t.done);
        const groupOk  = currentGroup === '' || t.group === currentGroup;
        return statusOk && groupOk;
      });
      const list = document.getElementById('todoList');

      if (filtered.length === 0) {
        const allDone = todos.length > 0 && todos.every(t => t.done);
        list.innerHTML = allDone
          ? `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">오늘 일정이 모두 완료되었습니다.</div><div class="empty-sub">수고하셨습니다!</div></div>`
          : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">오늘 일정이 모두 완료되었습니다.</div><div class="empty-sub">새 일정을 추가해보세요.</div></div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <input type="radio" ${t.done ? 'checked' : ''} onclick="toggleTodo('${t.id}')" />
          <div class="todo-info">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="todo-text">${escapeHtml(t.text)}</span>
              ${t.group ? `<span class="todo-group-badge">${escapeHtml(t.group)}</span>` : ''}
            </div>
            ${t.desc ? `<span class="todo-desc">${escapeHtml(t.desc)}</span>` : ''}
            ${t.done && t.completedAt ? `<div class="todo-meta"><span class="todo-completed-at">완료: ${t.completedAt}</span></div>` : ''}
          </div>
          <button class="btn-delete" onclick="deleteTodo('${t.id}')" title="삭제">✕</button>
        </div>`).join('');
    }

    window.addTodo = addTodo;
    window.addGroup = addGroup;
    window.deleteGroup = deleteGroup;
    window.setGroupFilter = setGroupFilter;
    window.setTab = setTab;
    window.toggleTodo = toggleTodo;
    window.deleteTodo = deleteTodo;
    window.handleAuth = handleAuth;
    window.switchAuthMode = switchAuthMode;
    window.signOut = signOut;
  </script>
</body>
</html>
